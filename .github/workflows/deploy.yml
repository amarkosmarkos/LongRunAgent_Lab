name: Deploy demo to GitHub Pages

# Publishes the frontend as a static, backend-free demo. Real runs are frozen
# into frontend/public/demo/ (see backend/app/scripts/export_demo.py) and the
# app replays them in demo mode (VITE_DEMO=1).

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; a newer push supersedes an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # enables Pages on first run and exposes the correct base path
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build demo
        working-directory: frontend
        run: npm run build
        env:
          VITE_DEMO: "1"
          # base_path from configure-pages already includes the trailing slash,
          # e.g. "/LongRunAgent_Lab/"
          VITE_DEPLOY_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
